<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts | Ronald Stout</title>

    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="contact-page">

    <!-- NAV -->
    <header>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <span>|</span>
            <a href="books.html">Books & Writing</a>
            <span>|</span>
            <a href="media.html">Media & Assets</a>
            <span>|</span>
            <a href="contact.html">Contacts</a>
        </nav>
    </header>

    <!-- CONTACT SECTION -->
    <section class="contact-section">

        <h2>CONTACTS</h2>

        <div class="contact-info">
            <p><strong>Publicist:</strong> Johanna Castillo</p>

            <p>Email:
                <a href="mailto:jcastillo@exemplumcircle.com">
                    jcastillo@exemplumcircle.com
                </a>,
                <a href="mailto:johanna.castillo7878@gmail.com">
                    johanna.castillo7878@gmail.com
                </a>
            </p>
        </div>

        <!-- FORM -->
        <form class="contact-form">
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Comment" rows="5" required></textarea>
            <button type="submit" class="btn">SEND</button>
        </form>

        <!-- VERSE BUTTONS -->
        <div class="verse-buttons">
            <button onclick="openVerse(1)" class="btn">VERSE 1</button>
            <button onclick="openVerse(2)" class="btn">VERSE 2</button>
            <button onclick="openVerse(3)" class="btn">VERSE 3</button>
            <button onclick="openVerse(4)" class="btn">VERSE 4</button>
        </div>

        <!-- INLINE VERSE SECTION -->
        <div id="verseModal" class="modal">

            <div class="modal-content">
                <div class="modal-verse">
                    <h3 id="verseTitle">VERSE 1</h3>

                    <div id="verseText" class="verse-body">
                        <!-- dynamic content -->
                    </div>
                </div>
                <button onclick="nextVerse()" class="btn next-btn">
                    NEXT VERSE
                </button>

            </div>

        </div>

    </section>

    <footer>
        <p>© 2026 RON STOUT. ALL RIGHTS RESERVED</p>
    </footer>

    <script src="contact.js"></script>

</body>

</html>
